<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .game-container {
            text-align: center;
        }
        .header {
            margin-bottom: 20px;
        }
        .header h1 {
            color: #FFD700;
            font-size: 48px;
            text-shadow: 3px 3px 0 #8B4513;
            margin-bottom: 10px;
        }
        .score-board {
            background: rgba(139, 69, 19, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .user-info {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .user-info .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        .user-info .stats span {
            color: #8B4513;
        }
        .login-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .login-btn:hover {
            background: #3367d6;
        }
        .logout-btn {
            background: #ea4335;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .logout-btn:hover {
            background: #d33426;
        }
        canvas {
            border: 5px solid #8B4513;
            border-radius: 10px;
            background: #F5DEB3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 100%;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            background: #FFD700;
            color: #8B4513;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.1);
        }
        button:active {
            transform: scale(0.95);
        }
        .instructions {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
            max-width: 600px;
            display: inline-block;
        }
        .instructions h3 {
            color: #8B4513;
            margin-bottom: 10px;
        }
        .instructions ul {
            color: #666;
            line-height: 1.8;
        }
        .leaderboard {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            max-height: 400px;
            overflow-y: auto;
            min-width: 180px;
        }
        .leaderboard h3 {
            color: #8B4513;
            margin-bottom: 10px;
            text-align: center;
            font-size: 16px;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        .leaderboard-item img {
            width: 25px;
            height: 25px;
            border-radius: 50%;
        }
        .leaderboard-item .rank {
            font-weight: bold;
            color: #FFD700;
            min-width: 20px;
        }
        .leaderboard-item .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .leaderboard-item .score {
            font-weight: bold;
            color: #8B4513;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 1200px) {
            .leaderboard {
                position: static;
                transform: none;
                margin-top: 20px;
                display: inline-block;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⛏️ 黄金矿工 ⛏️</h1>
            
            <!-- 用户信息区域 -->
            <div id="userSection" class="user-info hidden">
                <img id="userAvatar" src="" alt="avatar">
                <span id="userName">玩家</span>
                <div class="stats">
                    <span>🏆 最高: <strong id="highScore">0</strong></span>
                    <span>💰 总计: <strong id="totalScore">0</strong></span>
                </div>
                <button class="logout-btn" onclick="handleLogout()">退出</button>
            </div>
            
            <!-- 登录按钮 -->
            <div id="loginSection" class="user-info">
                <button class="login-btn" onclick="handleLogin()">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Google 登录
                </button>
                <span style="color: #666; font-size: 12px;">登录保存积分</span>
            </div>
            
            <div class="score-board">
                <span>💰 金币: <span id="score">0</span></span>
                <span style="margin-left: 30px;">⏱️ 时间: <span id="time">60</span>秒</span>
                <span style="margin-left: 30px;">🎯 关卡: <span id="level">1</span></span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button onclick="startGame()">开始游戏</button>
            <button onclick="dropHook()">发射钩子</button>
        </div>
        
        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li>⬅️➡️ 方向键控制钩子摆动方向</li>
                <li>空格键或点击"发射钩子"抓取宝物</li>
                <li>💰 金子: 100-500分</li>
                <li>💎 钻石: 800分</li>
                <li>🪨 石头: 20分（会减慢速度）</li>
                <li>⏱️ 60秒内达到目标分数过关</li>
                <li>🔐 登录后积分自动保存到云端</li>
            </ul>
        </div>
    </div>
    
    <!-- 排行榜 -->
    <div class="leaderboard">
        <h3>🏆 排行榜</h3>
        <div id="leaderboardList">
            <p style="color: #999; font-size: 12px; text-align: center;">加载中...</p>
        </div>
    </div>

    <script>
        // API 配置
        const API_URL = 'https://gold-miner-api.shuzurenceshi.workers.dev';
        
        // 用户状态
        let currentUser = null;
        let googleToken = null;
        
        // Google 登录
        function handleLogin() {
            google.accounts.id.prompt();
        }
        
        // 登录成功回调
        async function handleCredentialResponse(response) {
            googleToken = response.credential;
            
            try {
                const res = await fetch(`${API_URL}/api/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: googleToken })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    currentUser = data.user;
                    updateUserUI();
                    loadLeaderboard();
                    
                    if (data.isNewUser) {
                        console.log('欢迎新用户！');
                    }
                } else {
                    alert('登录失败: ' + data.error);
                }
            } catch (error) {
                console.error('登录错误:', error);
                alert('登录失败，请重试');
            }
        }
        
        // 退出登录
        function handleLogout() {
            currentUser = null;
            googleToken = null;
            document.getElementById('userSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }
        
        // 更新用户界面
        function updateUserUI() {
            if (!currentUser) return;
            
            document.getElementById('userAvatar').src = currentUser.picture || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23ddd"/></svg>';
            document.getElementById('userName').textContent = currentUser.name || '玩家';
            document.getElementById('highScore').textContent = currentUser.high_score || 0;
            document.getElementById('totalScore').textContent = currentUser.total_score || 0;
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('userSection').classList.remove('hidden');
        }
        
        // 同步分数到服务器
        async function syncScore(score, isHighScore) {
            if (!currentUser) return;
            
            try {
                await fetch(`${API_URL}/api/score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        google_id: currentUser.google_id,
                        score: score,
                        is_high_score: isHighScore
                    })
                });
                
                loadLeaderboard();
            } catch (error) {
                console.error('同步分数失败:', error);
            }
        }
        
        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const res = await fetch(`${API_URL}/api/leaderboard`);
                const data = await res.json();
                
                if (data.success && data.leaderboard) {
                    const list = document.getElementById('leaderboardList');
                    list.innerHTML = data.leaderboard.map((item, index) => `
                        <div class="leaderboard-item">
                            <span class="rank">${index + 1}</span>
                            <img src="${item.picture || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ddd%22/></svg>'}" alt="">
                            <span class="name">${item.name || '匿名'}</span>
                            <span class="score">${item.high_score}</span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
                document.getElementById('leaderboardList').innerHTML = '<p style="color: #999; font-size: 12px; text-align: center;">加载失败</p>';
            }
        }
        
        // 初始化 Google 登录
        function initGoogleAuth() {
            if (typeof google !== 'undefined' && google.accounts) {
                google.accounts.id.initialize({
                    client_id: '679234027308-24hi89l0ujpu2cmamdufbnm144hog79s.apps.googleusercontent.com',
                    callback: handleCredentialResponse
                });
                console.log('Google Auth initialized');
            } else {
                console.log('Google SDK not loaded, retrying...');
                setTimeout(initGoogleAuth, 500);
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initGoogleAuth();
            loadLeaderboard();
        });

        // ==================== 游戏逻辑 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameState = {
            score: 0,
            time: 60,
            level: 1,
            targetScore: 500,
            isPlaying: false,
            isPaused: false
        };
        
        // 矿工
        let miner = {
            x: canvas.width / 2,
            y: 60,
            hookAngle: 0,
            hookLength: 50,
            hookSpeed: 0.02,
            hookDirection: 1,
            isDropping: false,
            isRetracting: false,
            retractSpeed: 3,
            caughtItem: null
        };
        
        // 宝物
        let treasures = [];
        const treasureTypes = [
            { type: 'gold_small', value: 100, weight: 1, size: 20, color: '#FFD700' },
            { type: 'gold_medium', value: 250, weight: 2, size: 30, color: '#FFD700' },
            { type: 'gold_large', value: 500, weight: 3, size: 40, color: '#FFD700' },
            { type: 'diamond', value: 800, weight: 0.5, size: 25, color: '#00CED1' },
            { type: 'rock', value: 20, weight: 5, size: 35, color: '#808080' }
        ];
        
        // 初始化宝物
        function initTreasures() {
            treasures = [];
            const count = 8 + gameState.level * 2;
            
            for (let i = 0; i < count; i++) {
                const type = treasureTypes[Math.floor(Math.random() * treasureTypes.length)];
                treasures.push({
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: Math.random() * 300 + 250,
                    ...type,
                    rotation: Math.random() * Math.PI * 2
                });
            }
        }
        
        // 绘制矿工
        function drawMiner() {
            // 身体
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(miner.x - 20, miner.y - 30, 40, 50);
            
            // 头
            ctx.fillStyle = '#FFDAB9';
            ctx.beginPath();
            ctx.arc(miner.x, miner.y - 45, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // 帽子
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(miner.x - 18, miner.y - 65, 36, 10);
            
            // 钩子绳索
            const hookX = miner.x + Math.sin(miner.hookAngle) * miner.hookLength;
            const hookY = miner.y + Math.cos(miner.hookAngle) * miner.hookLength;
            
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(miner.x, miner.y);
            ctx.lineTo(hookX, hookY);
            ctx.stroke();
            
            // 钩子
            ctx.fillStyle = '#C0C0C0';
            ctx.beginPath();
            ctx.arc(hookX, hookY, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // 钩子尖端
            ctx.strokeStyle = '#C0C0C0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(hookX, hookY);
            ctx.lineTo(hookX + Math.sin(miner.hookAngle) * 15, hookY + Math.cos(miner.hookAngle) * 15);
            ctx.stroke();
            
            // 如果抓住了宝物
            if (miner.caughtItem) {
                const itemX = hookX + Math.sin(miner.hookAngle) * 20;
                const itemY = hookY + Math.cos(miner.hookAngle) * 20;
                drawTreasure(miner.caughtItem, itemX, itemY);
            }
        }
        
        // 绘制宝物
        function drawTreasure(treasure, x, y) {
            ctx.save();
            ctx.translate(x || treasure.x, y || treasure.y);
            ctx.rotate(treasure.rotation);
            
            if (treasure.type.includes('gold')) {
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.arc(0, 0, treasure.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFA500';
                ctx.font = `${treasure.size / 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 0);
            } else if (treasure.type === 'diamond') {
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.moveTo(0, -treasure.size / 2);
                ctx.lineTo(treasure.size / 2, 0);
                ctx.lineTo(0, treasure.size / 2);
                ctx.lineTo(-treasure.size / 2, 0);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.font = `${treasure.size / 3}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💎', 0, 0);
            } else if (treasure.type === 'rock') {
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.arc(0, 0, treasure.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#A9A9A9';
                ctx.font = `${treasure.size / 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🪨', 0, 0);
            }
            
            ctx.restore();
        }
        
        // 绘制地面
        function drawGround() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, 200);
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 200, canvas.width, canvas.height - 200);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, 195, canvas.width, 10);
        }
        
        // 更新游戏
        function update() {
            if (!gameState.isPlaying || gameState.isPaused) return;
            
            if (!miner.isDropping && !miner.isRetracting) {
                miner.hookAngle += miner.hookSpeed * miner.hookDirection;
                if (miner.hookAngle > Math.PI / 3 || miner.hookAngle < -Math.PI / 3) {
                    miner.hookDirection *= -1;
                }
            }
            
            if (miner.isDropping) {
                miner.hookLength += 5;
                
                const hookX = miner.x + Math.sin(miner.hookAngle) * miner.hookLength;
                const hookY = miner.y + Math.cos(miner.hookAngle) * miner.hookLength;
                
                for (let i = treasures.length - 1; i >= 0; i--) {
                    const t = treasures[i];
                    const dist = Math.sqrt((hookX - t.x) ** 2 + (hookY - t.y) ** 2);
                    if (dist < t.size / 2 + 8) {
                        miner.caughtItem = t;
                        treasures.splice(i, 1);
                        miner.isDropping = false;
                        miner.isRetracting = true;
                        miner.retractSpeed = 3 / t.weight;
                        break;
                    }
                }
                
                if (hookX < 0 || hookX > canvas.width || hookY > canvas.height) {
                    miner.isDropping = false;
                    miner.isRetracting = true;
                }
            }
            
            if (miner.isRetracting) {
                miner.hookLength -= miner.retractSpeed;
                
                if (miner.hookLength <= 50) {
                    miner.hookLength = 50;
                    miner.isRetracting = false;
                    
                    if (miner.caughtItem) {
                        gameState.score += miner.caughtItem.value;
                        document.getElementById('score').textContent = gameState.score;
                        miner.caughtItem = null;
                    }
                }
            }
        }
        
        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();
            treasures.forEach(t => drawTreasure(t));
            drawMiner();
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 200, 80);
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.fillText(`目标分数: ${gameState.targetScore}`, 20, 35);
            ctx.fillText(`当前分数: ${gameState.score}`, 20, 60);
            ctx.fillText(`剩余时间: ${gameState.time}秒`, 20, 85);
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 计时器
        let timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                if (gameState.isPlaying && !gameState.isPaused) {
                    gameState.time--;
                    document.getElementById('time').textContent = gameState.time;
                    
                    if (gameState.time <= 0) {
                        endGame();
                    }
                }
            }, 1000);
        }
        
        // 开始游戏
        function startGame() {
            gameState = {
                score: 0,
                time: 60,
                level: 1,
                targetScore: 500,
                isPlaying: true,
                isPaused: false
            };
            
            miner.hookLength = 50;
            miner.isDropping = false;
            miner.isRetracting = false;
            miner.caughtItem = null;
            
            initTreasures();
            
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '60';
            document.getElementById('level').textContent = '1';
            
            clearInterval(timerInterval);
            startTimer();
        }
        
        // 发射钩子
        function dropHook() {
            if (!gameState.isPlaying || miner.isDropping || miner.isRetracting) return;
            miner.isDropping = true;
        }
        
        // 结束游戏
        async function endGame() {
            gameState.isPlaying = false;
            clearInterval(timerInterval);
            
            const isHighScore = currentUser && gameState.score > (currentUser.high_score || 0);
            
            // 同步分数
            if (currentUser && gameState.score > 0) {
                await syncScore(gameState.score, isHighScore);
                
                // 更新本地显示
                if (isHighScore) {
                    currentUser.high_score = gameState.score;
                }
                currentUser.total_score = (currentUser.total_score || 0) + gameState.score;
                updateUserUI();
            }
            
            setTimeout(() => {
                if (gameState.score >= gameState.targetScore) {
                    alert(`🎉 恭喜过关！\n得分: ${gameState.score}${isHighScore ? '\n🏆 新纪录！' : ''}`);
                } else {
                    alert(`💔 游戏结束\n得分: ${gameState.score}\n目标: ${gameState.targetScore}${isHighScore ? '\n🏆 新纪录！' : ''}`);
                }
            }, 100);
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameState.isPlaying) return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                dropHook();
            }
        });
        
        // 初始化
        initTreasures();
        gameLoop();
    </script>
</body>
</html>
