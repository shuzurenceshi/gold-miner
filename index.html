<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .game-container {
            text-align: center;
        }
        .header {
            margin-bottom: 20px;
        }
        .header h1 {
            color: #FFD700;
            font-size: 48px;
            text-shadow: 3px 3px 0 #8B4513;
            margin-bottom: 10px;
        }
        .score-board {
            background: rgba(139, 69, 19, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        canvas {
            border: 5px solid #8B4513;
            border-radius: 10px;
            background: #F5DEB3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 100%;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            background: #FFD700;
            color: #8B4513;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.1);
        }
        button:active {
            transform: scale(0.95);
        }
        .instructions {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
            max-width: 600px;
            display: inline-block;
        }
        .instructions h3 {
            color: #8B4513;
            margin-bottom: 10px;
        }
        .instructions ul {
            color: #666;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⛏️ 黄金矿工 ⛏️</h1>
            <div class="score-board">
                <span>💰 金币: <span id="score">0</span></span>
                <span style="margin-left: 30px;">⏱️ 时间: <span id="time">60</span>秒</span>
                <span style="margin-left: 30px;">🎯 关卡: <span id="level">1</span></span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button onclick="startGame()">开始游戏</button>
            <button onclick="dropHook()">发射钩子</button>
        </div>
        
        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li>⬅️➡️ 方向键控制钩子摆动方向</li>
                <li>空格键或点击"发射钩子"抓取宝物</li>
                <li>💰 金子: 100-500分</li>
                <li>💎 钻石: 800分</li>
                <li>🪨 石头: 20分（会减慢速度）</li>
                <li>⏱️ 60秒内达到目标分数过关</li>
            </ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameState = {
            score: 0,
            time: 60,
            level: 1,
            targetScore: 500,
            isPlaying: false,
            isPaused: false
        };
        
        // 矿工
        let miner = {
            x: canvas.width / 2,
            y: 60,
            hookAngle: 0,
            hookLength: 50,
            hookSpeed: 0.02,
            hookDirection: 1,
            isDropping: false,
            isRetracting: false,
            retractSpeed: 3,
            caughtItem: null
        };
        
        // 宝物
        let treasures = [];
        const treasureTypes = [
            { type: 'gold_small', value: 100, weight: 1, size: 20, color: '#FFD700' },
            { type: 'gold_medium', value: 250, weight: 2, size: 30, color: '#FFD700' },
            { type: 'gold_large', value: 500, weight: 3, size: 40, color: '#FFD700' },
            { type: 'diamond', value: 800, weight: 0.5, size: 25, color: '#00CED1' },
            { type: 'rock', value: 20, weight: 5, size: 35, color: '#808080' }
        ];
        
        // 初始化宝物
        function initTreasures() {
            treasures = [];
            const count = 8 + gameState.level * 2;
            
            for (let i = 0; i < count; i++) {
                const type = treasureTypes[Math.floor(Math.random() * treasureTypes.length)];
                treasures.push({
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: Math.random() * 300 + 250,
                    ...type,
                    rotation: Math.random() * Math.PI * 2
                });
            }
        }
        
        // 绘制矿工
        function drawMiner() {
            // 身体
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(miner.x - 20, miner.y - 30, 40, 50);
            
            // 头
            ctx.fillStyle = '#FFDAB9';
            ctx.beginPath();
            ctx.arc(miner.x, miner.y - 45, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // 帽子
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(miner.x - 18, miner.y - 65, 36, 10);
            
            // 钩子绳索
            const hookX = miner.x + Math.sin(miner.hookAngle) * miner.hookLength;
            const hookY = miner.y + Math.cos(miner.hookAngle) * miner.hookLength;
            
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(miner.x, miner.y);
            ctx.lineTo(hookX, hookY);
            ctx.stroke();
            
            // 钩子
            ctx.fillStyle = '#C0C0C0';
            ctx.beginPath();
            ctx.arc(hookX, hookY, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // 钩子尖端
            ctx.strokeStyle = '#C0C0C0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(hookX, hookY);
            ctx.lineTo(hookX + Math.sin(miner.hookAngle) * 15, hookY + Math.cos(miner.hookAngle) * 15);
            ctx.stroke();
            
            // 如果抓住了宝物
            if (miner.caughtItem) {
                const itemX = hookX + Math.sin(miner.hookAngle) * 20;
                const itemY = hookY + Math.cos(miner.hookAngle) * 20;
                drawTreasure(miner.caughtItem, itemX, itemY);
            }
        }
        
        // 绘制宝物
        function drawTreasure(treasure, x, y) {
            ctx.save();
            ctx.translate(x || treasure.x, y || treasure.y);
            ctx.rotate(treasure.rotation);
            
            if (treasure.type.includes('gold')) {
                // 金子
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.arc(0, 0, treasure.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFA500';
                ctx.font = `${treasure.size / 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 0);
            } else if (treasure.type === 'diamond') {
                // 钻石
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.moveTo(0, -treasure.size / 2);
                ctx.lineTo(treasure.size / 2, 0);
                ctx.lineTo(0, treasure.size / 2);
                ctx.lineTo(-treasure.size / 2, 0);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.font = `${treasure.size / 3}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💎', 0, 0);
            } else if (treasure.type === 'rock') {
                // 石头
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.arc(0, 0, treasure.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#A9A9A9';
                ctx.font = `${treasure.size / 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🪨', 0, 0);
            }
            
            ctx.restore();
        }
        
        // 绘制地面
        function drawGround() {
            // 天空
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, 200);
            
            // 地面
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 200, canvas.width, canvas.height - 200);
            
            // 草地
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, 195, canvas.width, 10);
        }
        
        // 更新游戏
        function update() {
            if (!gameState.isPlaying || gameState.isPaused) return;
            
            // 钩子摆动
            if (!miner.isDropping && !miner.isRetracting) {
                miner.hookAngle += miner.hookSpeed * miner.hookDirection;
                if (miner.hookAngle > Math.PI / 3 || miner.hookAngle < -Math.PI / 3) {
                    miner.hookDirection *= -1;
                }
            }
            
            // 钩子下放
            if (miner.isDropping) {
                miner.hookLength += 5;
                
                // 检测碰撞
                const hookX = miner.x + Math.sin(miner.hookAngle) * miner.hookLength;
                const hookY = miner.y + Math.cos(miner.hookAngle) * miner.hookLength;
                
                for (let i = treasures.length - 1; i >= 0; i--) {
                    const t = treasures[i];
                    const dist = Math.sqrt((hookX - t.x) ** 2 + (hookY - t.y) ** 2);
                    if (dist < t.size / 2 + 8) {
                        miner.caughtItem = t;
                        treasures.splice(i, 1);
                        miner.isDropping = false;
                        miner.isRetracting = true;
                        miner.retractSpeed = 3 / t.weight;
                        break;
                    }
                }
                
                // 边界检测
                if (hookX < 0 || hookX > canvas.width || hookY > canvas.height) {
                    miner.isDropping = false;
                    miner.isRetracting = true;
                }
            }
            
            // 钩子收回
            if (miner.isRetracting) {
                miner.hookLength -= miner.retractSpeed;
                
                if (miner.hookLength <= 50) {
                    miner.hookLength = 50;
                    miner.isRetracting = false;
                    
                    if (miner.caughtItem) {
                        gameState.score += miner.caughtItem.value;
                        document.getElementById('score').textContent = gameState.score;
                        miner.caughtItem = null;
                    }
                }
            }
        }
        
        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawGround();
            
            // 绘制所有宝物
            treasures.forEach(t => drawTreasure(t));
            
            // 绘制矿工
            drawMiner();
            
            // 游戏信息
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 200, 80);
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.fillText(`目标分数: ${gameState.targetScore}`, 20, 35);
            ctx.fillText(`当前分数: ${gameState.score}`, 20, 60);
            ctx.fillText(`剩余时间: ${gameState.time}秒`, 20, 85);
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 计时器
        let timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                if (gameState.isPlaying && !gameState.isPaused) {
                    gameState.time--;
                    document.getElementById('time').textContent = gameState.time;
                    
                    if (gameState.time <= 0) {
                        endGame();
                    }
                }
            }, 1000);
        }
        
        // 开始游戏
        function startGame() {
            gameState = {
                score: 0,
                time: 60,
                level: 1,
                targetScore: 500,
                isPlaying: true,
                isPaused: false
            };
            
            miner.hookLength = 50;
            miner.isDropping = false;
            miner.isRetracting = false;
            miner.caughtItem = null;
            
            initTreasures();
            
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '60';
            document.getElementById('level').textContent = '1';
            
            clearInterval(timerInterval);
            startTimer();
        }
        
        // 发射钩子
        function dropHook() {
            if (!gameState.isPlaying || miner.isDropping || miner.isRetracting) return;
            miner.isDropping = true;
        }
        
        // 结束游戏
        function endGame() {
            gameState.isPlaying = false;
            clearInterval(timerInterval);
            
            setTimeout(() => {
                if (gameState.score >= gameState.targetScore) {
                    alert(`🎉 恭喜过关！\n得分: ${gameState.score}`);
                } else {
                    alert(`💔 游戏结束\n得分: ${gameState.score}\n目标: ${gameState.targetScore}`);
                }
            }, 100);
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameState.isPlaying) return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                dropHook();
            }
        });
        
        // 初始化
        initTreasures();
        gameLoop();
    </script>
</body>
</html>
