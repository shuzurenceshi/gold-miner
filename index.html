<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工</title>
    <!-- Google SDK - 同步加载确保可用 -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .game-container { text-align: center; max-width: 820px; margin: 0 auto; }
        .header { margin-bottom: 20px; }
        .header h1 {
            color: #FFD700;
            font-size: 42px;
            text-shadow: 3px 3px 0 #8B4513;
            margin-bottom: 15px;
        }
        
        /* 用户区域 */
        .user-area {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* 登录区域 */
        .login-section {
            text-align: center;
            padding: 10px;
        }
        .login-section p {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        /* Google 登录按钮容器 */
        #googleBtn {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        /* 备用登录按钮 */
        .alt-login-btn {
            background: linear-gradient(135deg, #4285f4 0%, #3367d6 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
            transition: all 0.3s;
        }
        .alt-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4);
        }
        .alt-login-btn:active { transform: scale(0.98); }
        
        /* 用户信息 */
        .user-info {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .user-info.show { display: flex; }
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #FFD700;
        }
        .user-details { text-align: left; }
        .user-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }
        .user-stats {
            font-size: 13px;
            color: #666;
        }
        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover { background: #d32f2f; }
        
        /* 记分板 */
        .score-board {
            background: rgba(139, 69, 19, 0.9);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            display: inline-block;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        canvas {
            border: 5px solid #8B4513;
            border-radius: 10px;
            background: #F5DEB3;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }
        
        .controls { margin-top: 20px; }
        button.game-btn {
            background: #FFD700;
            color: #8B4513;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s;
        }
        button.game-btn:hover { transform: scale(1.05); }
        button.game-btn:active { transform: scale(0.95); }
        
        .instructions {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
        .instructions h3 { color: #8B4513; margin-bottom: 10px; }
        .instructions ul { color: #666; line-height: 1.8; padding-left: 20px; }
        
        /* 排行榜 */
        .leaderboard {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .leaderboard h3 {
            color: #8B4513;
            margin-bottom: 12px;
            text-align: center;
        }
        .leaderboard-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .leaderboard-item:last-child { border-bottom: none; }
        .leaderboard-item img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        .leaderboard-item .rank {
            font-weight: bold;
            color: #FFD700;
            min-width: 25px;
        }
        .leaderboard-item .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .leaderboard-item .score {
            font-weight: bold;
            color: #8B4513;
        }
        
        .hidden { display: none !important; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 32px; }
            .score-board { font-size: 14px; padding: 10px 15px; }
            button.game-btn { padding: 12px 25px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⛏️ 黄金矿工 ⛏️</h1>
            
            <div class="user-area">
                <!-- 登录区域 -->
                <div id="loginSection" class="login-section">
                    <p>🔐 登录保存积分到云端</p>
                    <!-- Google 官方按钮 -->
                    <div id="googleBtn"></div>
                    <!-- 备用按钮 -->
                    <button id="altLoginBtn" class="alt-login-btn" onclick="handleAltLogin()">
                        <svg width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                        </svg>
                        Google 登录
                    </button>
                </div>
                
                <!-- 用户信息 -->
                <div id="userSection" class="user-info">
                    <img id="userAvatar" class="user-avatar" src="" alt="">
                    <div class="user-details">
                        <div id="userName" class="user-name">玩家</div>
                        <div class="user-stats">
                            🏆 最高: <strong id="highScore">0</strong> | 
                            💰 总计: <strong id="totalScore">0</strong>
                        </div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">退出</button>
                </div>
            </div>
            
            <div class="score-board">
                <span>💰 金币: <strong id="score">0</strong></span>
                <span style="margin-left: 20px;">⏱️ 时间: <strong id="time">60</strong>秒</span>
                <span style="margin-left: 20px;">🎯 关卡: <strong id="level">1</strong></span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button class="game-btn" onclick="startGame()">🎮 开始游戏</button>
            <button class="game-btn" onclick="dropHook()">⚓ 发射钩子</button>
        </div>
        
        <div class="leaderboard">
            <h3>🏆 排行榜</h3>
            <div id="leaderboardList" class="leaderboard-list">
                <p style="color:#999;text-align:center;padding:20px">加载中...</p>
            </div>
        </div>
        
        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li>⬅️➡️ 方向键控制钩子摆动方向</li>
                <li>空格键或点击"发射钩子"抓取宝物</li>
                <li>💰 金子: 100-500分</li>
                <li>💎 钻石: 800分</li>
                <li>🪨 石头: 20分（会减慢速度）</li>
                <li>⏱️ 60秒内达到目标分数过关</li>
                <li>🔐 登录后积分自动保存</li>
            </ul>
        </div>
    </div>

    <script>
        // ==================== 用户认证 ====================
        const API_URL = 'https://gold-miner-api.shuzurenceshi.workers.dev';
        const CLIENT_ID = '679234027308-24hi89l0ujpu2cmamdufbnm144hog79s.apps.googleusercontent.com';
        
        let currentUser = null;
        let googleInitialized = false;
        
        // 初始化 Google 登录
        function initGoogleAuth() {
            // 检查 Google SDK 是否加载
            if (typeof google === 'undefined' || !google.accounts) {
                console.log('Google SDK not ready, waiting...');
                document.getElementById('sdkStatus').textContent = 'Google SDK 加载中...';
                setTimeout(initGoogleAuth, 200);
                return;
            }
            
            console.log('Google SDK loaded, initializing...');
            document.getElementById('sdkStatus').textContent = '';
            
            try {
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: handleCredentialResponse,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });
                
                // 渲染官方按钮
                google.accounts.id.renderButton(
                    document.getElementById('googleBtn'),
                    {
                        theme: 'filled_blue',
                        size: 'large',
                        width: 220,
                        text: 'signin_with',
                        shape: 'rectangular'
                    }
                );
                
                googleInitialized = true;
                console.log('Google Auth initialized successfully');
                
                // 隐藏备用按钮（官方按钮可用）
                document.getElementById('altLoginBtn').style.display = 'none';
                
            } catch (e) {
                console.error('Google init error:', e);
                document.getElementById('sdkStatus').textContent = '官方按钮加载失败，请使用下方按钮';
            }
        }
        
        // 页面加载后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initGoogleAuth();
            loadLeaderboard();
        });
        
        // 备用登录按钮（使用 One Tap）
        function handleAltLogin() {
            if (typeof google === 'undefined' || !google.accounts) {
                alert('Google SDK 未加载，请刷新页面重试');
                return;
            }
            
            if (!googleInitialized) {
                // 尝试重新初始化
                initGoogleAuth();
            }
            
            try {
                google.accounts.id.prompt();
            } catch (e) {
                console.error('Prompt error:', e);
                alert('请刷新页面后重试');
            }
        }
        
        // 登录成功回调
        function handleCredentialResponse(response) {
            console.log('Login response received');
            verifyToken(response.credential);
        }
        
        // 验证 Token
        async function verifyToken(idToken) {
                const res = await fetch(`${API_URL}/api/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: response.credential })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    currentUser = data.user;
                    updateUserUI();
                    loadLeaderboard();
                    console.log('Login success:', currentUser.name);
                } else {
                    alert('登录失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('Verify error:', error);
                alert('登录验证失败，请重试');
            }
        }
        
        // 更新用户界面
        function updateUserUI() {
            if (!currentUser) return;
            
            document.getElementById('userAvatar').src = currentUser.picture || '';
            document.getElementById('userName').textContent = currentUser.name || '玩家';
            document.getElementById('highScore').textContent = currentUser.high_score || 0;
            document.getElementById('totalScore').textContent = currentUser.total_score || 0;
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('userSection').classList.add('show');
        }
        
        // 退出登录
        function handleLogout() {
            currentUser = null;
            document.getElementById('userSection').classList.remove('show');
            document.getElementById('loginSection').classList.remove('hidden');
            
            if (googleInitialized) {
                google.accounts.id.disableAutoSelect();
            }
        }
        
        // 同步分数
        async function syncScore(score, isHighScore) {
            if (!currentUser) return;
            
            try {
                await fetch(`${API_URL}/api/score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        google_id: currentUser.google_id,
                        score: score,
                        is_high_score: isHighScore
                    })
                });
                loadLeaderboard();
            } catch (error) {
                console.error('Sync error:', error);
            }
        }
        
        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const res = await fetch(`${API_URL}/api/leaderboard`);
                const data = await res.json();
                
                if (data.success && data.leaderboard) {
                    const list = document.getElementById('leaderboardList');
                    if (data.leaderboard.length === 0) {
                        list.innerHTML = '<p style="color:#999;text-align:center;padding:20px">暂无数据</p>';
                        return;
                    }
                    list.innerHTML = data.leaderboard.map((item, i) => `
                        <div class="leaderboard-item">
                            <span class="rank">${i + 1}</span>
                            <img src="${item.picture || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ddd%22/></svg>'}" alt="">
                            <span class="name">${item.name || '匿名'}</span>
                            <span class="score">${item.high_score}</span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Leaderboard error:', error);
            }
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', loadLeaderboard);

        // ==================== 游戏逻辑 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = {
            score: 0,
            time: 60,
            level: 1,
            targetScore: 500,
            isPlaying: false
        };
        
        let miner = {
            x: canvas.width / 2,
            y: 60,
            hookAngle: 0,
            hookLength: 50,
            hookSpeed: 0.02,
            hookDirection: 1,
            isDropping: false,
            isRetracting: false,
            retractSpeed: 3,
            caughtItem: null
        };
        
        let treasures = [];
        const treasureTypes = [
            { type: 'gold_small', value: 100, weight: 1, size: 20, color: '#FFD700' },
            { type: 'gold_medium', value: 250, weight: 2, size: 30, color: '#FFD700' },
            { type: 'gold_large', value: 500, weight: 3, size: 40, color: '#FFD700' },
            { type: 'diamond', value: 800, weight: 0.5, size: 25, color: '#00CED1' },
            { type: 'rock', value: 20, weight: 5, size: 35, color: '#808080' }
        ];
        
        function initTreasures() {
            treasures = [];
            const count = 8 + gameState.level * 2;
            for (let i = 0; i < count; i++) {
                const type = treasureTypes[Math.floor(Math.random() * treasureTypes.length)];
                treasures.push({
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: Math.random() * 300 + 250,
                    ...type,
                    rotation: Math.random() * Math.PI * 2
                });
            }
        }
        
        function drawMiner() {
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(miner.x - 20, miner.y - 30, 40, 50);
            ctx.fillStyle = '#FFDAB9';
            ctx.beginPath();
            ctx.arc(miner.x, miner.y - 45, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(miner.x - 18, miner.y - 65, 36, 10);
            
            const hookX = miner.x + Math.sin(miner.hookAngle) * miner.hookLength;
            const hookY = miner.y + Math.cos(miner.hookAngle) * miner.hookLength;
            
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(miner.x, miner.y);
            ctx.lineTo(hookX, hookY);
            ctx.stroke();
            
            ctx.fillStyle = '#C0C0C0';
            ctx.beginPath();
            ctx.arc(hookX, hookY, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#C0C0C0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(hookX, hookY);
            ctx.lineTo(hookX + Math.sin(miner.hookAngle) * 15, hookY + Math.cos(miner.hookAngle) * 15);
            ctx.stroke();
            
            if (miner.caughtItem) {
                const itemX = hookX + Math.sin(miner.hookAngle) * 20;
                const itemY = hookY + Math.cos(miner.hookAngle) * 20;
                drawTreasure(miner.caughtItem, itemX, itemY);
            }
        }
        
        function drawTreasure(treasure, x, y) {
            ctx.save();
            ctx.translate(x || treasure.x, y || treasure.y);
            ctx.rotate(treasure.rotation);
            
            if (treasure.type.includes('gold')) {
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.arc(0, 0, treasure.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFA500';
                ctx.font = `${treasure.size / 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 0);
            } else if (treasure.type === 'diamond') {
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.moveTo(0, -treasure.size / 2);
                ctx.lineTo(treasure.size / 2, 0);
                ctx.lineTo(0, treasure.size / 2);
                ctx.lineTo(-treasure.size / 2, 0);
                ctx.closePath();
                ctx.fill();
            } else if (treasure.type === 'rock') {
                ctx.fillStyle = treasure.color;
                ctx.beginPath();
                ctx.arc(0, 0, treasure.size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        
        function drawGround() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, 200);
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 200, canvas.width, canvas.height - 200);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, 195, canvas.width, 10);
        }
        
        function update() {
            if (!gameState.isPlaying) return;
            
            if (!miner.isDropping && !miner.isRetracting) {
                miner.hookAngle += miner.hookSpeed * miner.hookDirection;
                if (miner.hookAngle > Math.PI / 3 || miner.hookAngle < -Math.PI / 3) {
                    miner.hookDirection *= -1;
                }
            }
            
            if (miner.isDropping) {
                miner.hookLength += 5;
                const hookX = miner.x + Math.sin(miner.hookAngle) * miner.hookLength;
                const hookY = miner.y + Math.cos(miner.hookAngle) * miner.hookLength;
                
                for (let i = treasures.length - 1; i >= 0; i--) {
                    const t = treasures[i];
                    const dist = Math.sqrt((hookX - t.x) ** 2 + (hookY - t.y) ** 2);
                    if (dist < t.size / 2 + 8) {
                        miner.caughtItem = t;
                        treasures.splice(i, 1);
                        miner.isDropping = false;
                        miner.isRetracting = true;
                        miner.retractSpeed = 3 / t.weight;
                        break;
                    }
                }
                
                if (hookX < 0 || hookX > canvas.width || hookY > canvas.height) {
                    miner.isDropping = false;
                    miner.isRetracting = true;
                }
            }
            
            if (miner.isRetracting) {
                miner.hookLength -= miner.retractSpeed;
                if (miner.hookLength <= 50) {
                    miner.hookLength = 50;
                    miner.isRetracting = false;
                    if (miner.caughtItem) {
                        gameState.score += miner.caughtItem.value;
                        document.getElementById('score').textContent = gameState.score;
                        miner.caughtItem = null;
                    }
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGround();
            treasures.forEach(t => drawTreasure(t));
            drawMiner();
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 180, 70);
            ctx.fillStyle = 'white';
            ctx.font = '14px Arial';
            ctx.fillText(`目标: ${gameState.targetScore}`, 20, 32);
            ctx.fillText(`当前: ${gameState.score}`, 20, 52);
            ctx.fillText(`时间: ${gameState.time}s`, 20, 72);
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        let timerInterval;
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState.isPlaying) {
                    gameState.time--;
                    document.getElementById('time').textContent = gameState.time;
                    if (gameState.time <= 0) endGame();
                }
            }, 1000);
        }
        
        function startGame() {
            gameState = { score: 0, time: 60, level: 1, targetScore: 500, isPlaying: true };
            miner.hookLength = 50;
            miner.isDropping = false;
            miner.isRetracting = false;
            miner.caughtItem = null;
            initTreasures();
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '60';
            document.getElementById('level').textContent = '1';
            startTimer();
        }
        
        function dropHook() {
            if (!gameState.isPlaying || miner.isDropping || miner.isRetracting) return;
            miner.isDropping = true;
        }
        
        async function endGame() {
            gameState.isPlaying = false;
            clearInterval(timerInterval);
            
            const isHighScore = currentUser && gameState.score > (currentUser.high_score || 0);
            
            if (currentUser && gameState.score > 0) {
                await syncScore(gameState.score, isHighScore);
                if (isHighScore) currentUser.high_score = gameState.score;
                currentUser.total_score = (currentUser.total_score || 0) + gameState.score;
                updateUserUI();
            }
            
            setTimeout(() => {
                let msg = gameState.score >= gameState.targetScore 
                    ? `🎉 恭喜过关！\n得分: ${gameState.score}`
                    : `💔 游戏结束\n得分: ${gameState.score}\n目标: ${gameState.targetScore}`;
                if (isHighScore) msg += '\n🏆 新纪录！';
                alert(msg);
            }, 100);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                dropHook();
            }
        });
        
        initTreasures();
        gameLoop();
    </script>
</body>
</html>
